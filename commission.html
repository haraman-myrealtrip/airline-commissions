<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항공사 커미션 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1a1a2e; }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  /* Header */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 16px 32px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header-nav { display: flex; gap: 4px; }
  .header-nav a { color: #a0aec0; text-decoration: none; font-size: 13px; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
  .header-nav a:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .header-nav a.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  /* Notice Bell */
  .notice-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 0.2s; }
  .notice-bell:hover { background: rgba(255,255,255,0.1); }
  .notice-bell svg { width: 20px; height: 20px; fill: #a0aec0; }
  .notice-bell .badge-count { position: absolute; top: 2px; right: 2px; background: #e53e3e; color: #fff; font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .notice-dropdown { position: absolute; top: 40px; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 360px; max-height: 400px; overflow-y: auto; z-index: 200; display: none; }
  .notice-dropdown.show { display: block; }
  .notice-dropdown-header { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 14px; color: #1a1a2e; display: flex; justify-content: space-between; align-items: center; }
  .notice-item { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; cursor: default; }
  .notice-item:last-child { border-bottom: none; }
  .notice-item .notice-title { font-weight: 600; font-size: 13px; color: #1a1a2e; margin-bottom: 4px; }
  .notice-item .notice-body { font-size: 12px; color: #4a5568; line-height: 1.5; }
  .notice-item .notice-date { font-size: 11px; color: #a0aec0; margin-top: 6px; }
  .notice-item.urgent { border-left: 3px solid #e53e3e; background: #fff5f5; }
  .notice-empty { padding: 32px 16px; text-align: center; color: #a0aec0; font-size: 13px; }

  /* Notice Banner */
  .notice-banner { background: linear-gradient(90deg, #fff7ed 0%, #fffbeb 100%); border-bottom: 1px solid #fed7aa; padding: 10px 32px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #92400e; }
  .notice-banner .notice-icon { font-size: 16px; flex-shrink: 0; }
  .notice-banner .notice-text { flex: 1; }
  .notice-banner .close-btn { cursor: pointer; color: #b45309; font-size: 18px; padding: 0 4px; }
  .notice-banner.hidden { display: none; }

  /* Login */
  .login-area { display: flex; align-items: center; gap: 8px; }
  .login-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { background: rgba(255,255,255,0.2); }
  .user-info { font-size: 12px; color: #a0aec0; }
  .user-info strong { color: #fff; }

  /* Stats Bar */
  .stats-bar { display: flex; gap: 16px; padding: 16px 32px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
  .stat-card { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 20px; min-width: 140px; }
  .stat-card .label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-top: 2px; }
  .stat-card .value.blue { color: #3182ce; }
  .stat-card .value.green { color: #38a169; }
  .stat-card .value.orange { color: #dd6b20; }
  .stat-card .value.purple { color: #6b46c1; }

  /* Controls */
  .controls { display: flex; gap: 12px; padding: 16px 32px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; align-items: center; }
  .search-box { position: relative; flex: 1; min-width: 200px; max-width: 400px; }
  .search-box input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.1); }
  .search-box .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 16px; }
  .filter-btn { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; color: #4a5568; }
  .filter-btn:hover { background: #f7fafc; }
  .filter-btn.active { background: #ebf5ff; border-color: #3182ce; color: #3182ce; font-weight: 600; }
  .view-toggle { display: flex; border: 1px solid #d1d5db; border-radius: 8px; overflow: hidden; margin-left: auto; }
  .view-toggle button { padding: 8px 14px; border: none; background: #fff; font-size: 13px; cursor: pointer; color: #4a5568; transition: all 0.2s; }
  .view-toggle button.active { background: #1a1a2e; color: #fff; }

  /* Main Content */
  .main { padding: 20px 32px; max-width: 1600px; margin: 0 auto; }

  /* Card Grid */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* Airline Card */
  .airline-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; cursor: pointer; }
  .airline-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .airline-card.has-overcom { border-left: 4px solid #38a169; }
  .airline-card.no-com { border-left: 4px solid #e2e8f0; }
  .airline-card.kea { border-left: 4px solid #6b46c1; }

  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; }
  .airline-code { font-size: 28px; font-weight: 800; color: #1a1a2e; letter-spacing: 1px; }
  .airline-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.bsp { background: #ebf5ff; color: #2b6cb0; }
  .badge.over { background: #f0fff4; color: #276749; }
  .badge.expired { background: #fff5f5; color: #c53030; }
  .badge.kea { background: #faf5ff; color: #6b46c1; }

  .card-rates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 12px; }
  .rate-item { text-align: center; padding: 8px; background: #f7fafc; border-radius: 8px; }
  .rate-item .rate-label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.3px; }
  .rate-item .rate-value { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .rate-item .rate-value.highlight { color: #38a169; }
  .rate-item .rate-value.zero { color: #cbd5e0; }

  .card-details { padding: 0 20px 12px; }
  .detail-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-tag { font-size: 11px; color: #4a5568; background: #f7fafc; padding: 3px 8px; border-radius: 4px; }
  .detail-tag span { font-weight: 600; }

  .card-notes { padding: 8px 20px; background: #fffbeb; border-top: 1px solid #fef3c7; font-size: 12px; color: #92400e; line-height: 1.5; }

  /* Account Code */
  .card-account { padding: 8px 20px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
  .account-label { font-size: 11px; color: #718096; }
  .account-value { font-size: 13px; font-weight: 600; color: #1a1a2e; font-family: 'Courier New', monospace; }
  .copy-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; font-size: 11px; cursor: pointer; color: #4a5568; transition: all 0.2s; }
  .copy-btn:hover { background: #ebf5ff; border-color: #3182ce; color: #3182ce; }
  .copy-btn.copied { background: #f0fff4; border-color: #38a169; color: #38a169; }
  .copy-btn svg { width: 12px; height: 12px; }

  /* List View */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .card-grid-wrap.active { display: grid; }
  .card-grid-wrap { display: none; }

  .list-table { width: 100%; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; font-size: 13px; border-collapse: collapse; }
  .list-table thead th { background: #1a1a2e; color: #fff; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 12px; position: sticky; top: 0; white-space: nowrap; }
  .list-table tbody td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  .list-table tbody tr { cursor: pointer; transition: background 0.15s; }
  .list-table tbody tr:hover td { background: #f7fafc; }
  .list-table .com-cell { font-weight: 700; text-align: center; }
  .list-table .com-cell.has-value { color: #38a169; }
  .list-table .com-cell.no-value { color: #cbd5e0; }
  .list-table .acct-cell { font-family: 'Courier New', monospace; font-size: 12px; }

  /* History Section */
  .history-toggle { width: 100%; padding: 10px 20px; background: #f7fafc; border: none; border-top: 1px solid #e2e8f0; font-size: 13px; color: #4a5568; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
  .history-toggle:hover { background: #edf2f7; }
  .history-toggle .arrow { transition: transform 0.3s; }
  .history-toggle.open .arrow { transform: rotate(180deg); }
  .history-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .history-panel.open { max-height: 2000px; }
  .history-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .history-table th { background: #f1f5f9; padding: 8px 12px; text-align: left; font-weight: 600; color: #475569; }
  .history-table td { padding: 8px 12px; border-top: 1px solid #f1f5f9; vertical-align: top; }
  .history-table tr:hover td { background: #f7fafc; }
  .history-table .route { font-weight: 600; color: #1a1a2e; }
  .history-table .period { color: #718096; white-space: nowrap; }
  .history-table .note-cell { max-width: 250px; line-height: 1.4; color: #4a5568; }
  .history-table tr.is-current { background: #f0fff4; }
  .history-table tr.is-current td { border-left: 3px solid #38a169; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Empty State */
  .empty-state { text-align: center; padding: 60px 20px; color: #a0aec0; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Responsive */
  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 12px; padding: 12px 16px; }
    .header-left { flex-direction: column; gap: 8px; }
    .controls, .stats-bar, .main { padding-left: 16px; padding-right: 16px; }
    .card-grid { grid-template-columns: 1fr; }
    .notice-dropdown { width: 300px; right: -60px; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>항공사 커미션 대시보드</h1>
    <nav class="header-nav">
      <a href="#list" class="active">커미션 관리</a>
      <a href="#admin">관리자</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="notice-bell" id="noticeBell" onclick="toggleNoticeDropdown(event)">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span class="badge-count" id="noticeBadge" style="display:none;">0</span>
    </div>
    <div class="notice-dropdown" id="noticeDropdown">
      <div class="notice-dropdown-header">
        <span>공지사항</span>
      </div>
      <div id="noticeList"></div>
    </div>
    <div class="login-area" id="loginArea">
      <button class="login-btn" onclick="handleLogin()">Google 로그인</button>
    </div>
  </div>
</div>

<div class="notice-banner hidden" id="noticeBanner">
  <span class="notice-icon">&#128226;</span>
  <span class="notice-text" id="bannerText"></span>
  <span class="close-btn" onclick="this.parentElement.classList.add('hidden')">&times;</span>
</div>

<div id="mainApp">
  <!-- LIST VIEW -->
  <div id="listPage">
    <div class="stats-bar" id="statsBar"></div>
    <div class="controls">
      <div class="search-box">
        <span class="icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="항공사 코드로 검색 (예: AA, BR, NH)">
      </div>
      <button class="filter-btn" data-filter="has-over">오버컴</button>
      <button class="filter-btn" data-filter="has-bsp">BSP컴</button>
      <button class="filter-btn" data-filter="kea">KE@A</button>
      <button class="filter-btn active" data-filter="all">전체</button>
      <div class="view-toggle">
        <button class="active" data-view="card">카드형</button>
        <button data-view="list">리스트형</button>
      </div>
    </div>
    <div class="main">
      <div class="card-grid-wrap active card-grid" id="cardGrid"></div>
      <div class="list-view" id="listView"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">&#9992;&#65039;</div>
        <p>검색 결과가 없습니다</p>
      </div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="adminPage" style="display:none;">
    <div class="main">
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;margin-bottom:20px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">공지사항 관리</h2>
        <div id="adminNoticeList" style="margin-bottom:16px;"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" id="noticeTitle" placeholder="공지 제목" style="flex:1;min-width:150px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
          <input type="text" id="noticeBody" placeholder="공지 내용" style="flex:2;min-width:200px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#4a5568;"><input type="checkbox" id="noticeUrgent"> 긴급</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#4a5568;"><input type="checkbox" id="noticeBanner"> 배너표시</label>
          <button onclick="addNotice()" style="padding:8px 16px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">추가</button>
        </div>
      </div>

      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;margin-bottom:20px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Slack 알림 설정</h2>
        <p style="font-size:13px;color:#4a5568;margin-bottom:12px;">커미션 변동 사항이 있을 때 Slack 채널로 자동 알림을 보냅니다.</p>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label style="font-size:13px;color:#4a5568;">Webhook URL:</label>
          <input type="text" id="slackWebhook" placeholder="https://hooks.slack.com/services/..." style="flex:1;min-width:300px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:monospace;">
          <button onclick="saveSlackWebhook()" style="padding:8px 16px;background:#4A154B;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">저장</button>
          <button onclick="testSlackNotification()" style="padding:8px 16px;background:#fff;color:#4A154B;border:1px solid #4A154B;border-radius:6px;font-size:13px;cursor:pointer;">테스트 발송</button>
        </div>
        <div style="margin-top:12px;padding:12px;background:#f7fafc;border-radius:8px;">
          <p style="font-size:12px;color:#718096;margin-bottom:8px;">Slack 채널: <a href="https://myrealtrip.slack.com/archives/C3B1YCYJG" target="_blank" style="color:#3182ce;">#aicx</a></p>
          <p style="font-size:12px;color:#718096;">Webhook 설정 방법: Slack App 관리 &gt; Incoming Webhooks &gt; 워크스페이스에 추가 &gt; 채널 선택 (#aicx) &gt; Webhook URL 복사</p>
        </div>
      </div>

      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">커미션 데이터 편집</h2>
        <p style="font-size:13px;color:#4a5568;margin-bottom:12px;">Google Sheets에서 직접 편집하세요.</p>
        <a href="https://docs.google.com/spreadsheets/d/12qqW-NFFxbcvQa_whjoe2LRseCTVwWcLt07AvJzxcVs/edit" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#34a853;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/><path d="M7 12h2v5H7zm4-3h2v8h-2zm4-3h2v11h-2z"/></svg>
          Google Sheets에서 편집하기
        </a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============ HELPERS ============
function getNum(v) {
  if (typeof v === 'number') return v;
  if (typeof v === 'string') { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
  return 0;
}

function isKEA(a) {
  return a.notes && a.notes.includes('KE@A');
}

function isCurrentPeriod(ticketing) {
  if (!ticketing) return false;
  if (ticketing.includes('2026') || ticketing.includes('2027')) return true;
  const parts = ticketing.split('~');
  if (parts.length === 2) {
    const end = parts[1].trim().replace(/\s/g,'');
    if (end === '') return false;
    const match = end.match(/(\d{4})\.?(\d{1,2})\.?(\d{1,2})?/);
    if (match) {
      const y = parseInt(match[1]);
      const m = parseInt(match[2]) - 1;
      const d = parseInt(match[3] || '28');
      return new Date(y, m, d) >= TODAY;
    }
  }
  return false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyAccountCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> 복사됨';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사';
    }, 1500);
  });
}

// ============ RENDER ============
function renderStats() {
  const total = airlines.length;
  const hasBsp = airlines.filter(a => getNum(a.bsp) > 0).length;
  const hasOver = airlines.filter(a => getNum(a.over) > 0).length;
  const keaCount = airlines.filter(a => isKEA(a)).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="label">전체 항공사</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">오버커미션</div><div class="value green">${hasOver}</div></div>
    <div class="stat-card"><div class="label">BSP 커미션</div><div class="value blue">${hasBsp}</div></div>
    <div class="stat-card"><div class="label">KE@A</div><div class="value purple">${keaCount}</div></div>
  `;
}

function renderCards(filtered) {
  const grid = document.getElementById('cardGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  grid.innerHTML = filtered.map(a => {
    const bspNum = getNum(a.bsp);
    const overNum = getNum(a.over);
    const hasOvercom = overNum > 0;
    const kea = isKEA(a);
    const cardClass = kea ? 'kea' : (hasOvercom ? 'has-overcom' : (bspNum > 0 ? '' : 'no-com'));

    const badges = [];
    if (bspNum > 0) badges.push('<span class="badge bsp">BSP '+a.bsp+'%</span>');
    if (hasOvercom) badges.push('<span class="badge over">오버컴 '+a.over+'%</span>');
    if (kea) badges.push('<span class="badge kea">KE@A</span>');
    if (bspNum === 0 && !hasOvercom && !kea) badges.push('<span class="badge expired">노컴</span>');

    const sotoStr = a.soto === 0 ? '0%' : (typeof a.soto === 'string' ? a.soto : a.soto + '%');
    const chdStr = a.chd === 0 ? '0%' : (typeof a.chd === 'string' ? a.chd : a.chd + '%');
    const infStr = a.inf === 0 ? '0%' : (typeof a.inf === 'string' ? a.inf : a.inf + '%');

    const notesHtml = a.notes ? '<div class="card-notes">'+a.notes+'</div>' : '';

    const accountHtml = a.accountCode ? `
      <div class="card-account">
        <div><span class="account-label">Account Code</span> <span class="account-value">${a.accountCode}</span></div>
        <button class="copy-btn" onclick="event.stopPropagation();copyAccountCode('${a.accountCode}',this)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사
        </button>
      </div>` : `
      <div class="card-account">
        <div><span class="account-label">Account Code</span> <span class="account-value" style="color:#cbd5e0;">미등록</span></div>
      </div>`;

    const hist = history.filter(h => h.code === a.code);
    const historyHtml = hist.length > 0 ? `
      <button class="history-toggle" onclick="event.stopPropagation();this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');">
        <span>커미션 히스토리 (${hist.length}건)</span>
        <span class="arrow">&#9660;</span>
      </button>
      <div class="history-panel">
        <table class="history-table">
          <thead><tr><th>노선</th><th>BSP</th><th>오버컴</th><th>발권기간</th><th>출발기간</th><th>비고</th></tr></thead>
          <tbody>
            ${hist.map(h => `
              <tr class="${isCurrentPeriod(h.ticketing) ? 'is-current' : ''}">
                <td class="route">${h.route}</td>
                <td>${h.bsp || '-'}</td>
                <td>${h.overEY || '-'}${h.overBZ ? ' / BZ:'+h.overBZ : ''}</td>
                <td class="period">${h.ticketing || '-'}</td>
                <td class="period">${h.departure || '-'}</td>
                <td class="note-cell">${h.notes || '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : '';

    return `
      <div class="airline-card ${cardClass}">
        <div class="card-header">
          <span class="airline-code">${a.code}</span>
          <div class="airline-badges">${badges.join('')}</div>
        </div>
        <div class="card-rates">
          <div class="rate-item"><div class="rate-label">BSP컴</div><div class="rate-value ${bspNum > 0 ? 'highlight' : 'zero'}">${a.bsp}%</div></div>
          <div class="rate-item"><div class="rate-label">오버컴</div><div class="rate-value ${overNum > 0 ? 'highlight' : 'zero'}">${a.over}%</div></div>
          <div class="rate-item"><div class="rate-label">SOTO</div><div class="rate-value ${getNum(a.soto) > 0 ? 'highlight' : 'zero'}">${sotoStr}</div></div>
        </div>
        <div class="card-details">
          <div class="detail-row">
            <div class="detail-tag">재발행 <span>${a.reissue}%</span></div>
            <div class="detail-tag">소아 <span>${chdStr}</span></div>
            <div class="detail-tag">유아 <span>${infStr}</span></div>
          </div>
        </div>
        ${notesHtml}
        ${accountHtml}
        ${historyHtml}
      </div>
    `;
  }).join('');
}

      <thead>
        <tr>
          <th>항공사</th><th>BSP컴</th><th>오버컴</th><th>SOTO</th><th>재발행</th><th>소아</th><th>유아</th><th>Account Code</th><th>비고</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(a => {
          const bspNum = getNum(a.bsp);
          const overNum = getNum(a.over);
          const kea = isKEA(a);
          return `<tr>
            <td style="font-weight:800;font-size:15px;">${a.code}${kea ? ' <span class="badge kea" style="font-size:10px;">KE@A</span>' : ''}</td>
            <td class="com-cell ${bspNum > 0 ? 'has-value' : 'no-value'}">${a.bsp}%</td>
            <td class="com-cell ${overNum > 0 ? 'has-value' : 'no-value'}">${a.over}%</td>
            <td class="com-cell">${typeof a.soto === 'string' ? a.soto : a.soto + '%'}</td>
            <td class="com-cell">${a.reissue}%</td>
            <td class="com-cell">${typeof a.chd === 'string' ? a.chd : a.chd + '%'}</td>
            <td class="com-cell">${typeof a.inf === 'string' ? a.inf : a.inf + '%'}</td>
            <td class="acct-cell">${a.accountCode ? '<span style="cursor:pointer" onclick="copyAccountCode(\''+a.accountCode+'\',this);showToast(\'복사됨\')">'+a.accountCode+' &#128203;</span>' : '<span style="color:#cbd5e0">-</span>'}</td>
            <td style="font-size:12px;max-width:300px;color:#4a5568;">${a.notes || '-'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ============ NOTICES ============
function renderNotices() {
  const list = document.getElementById('noticeList');
  const badge = document.getElementById('noticeBadge');
  const banner = document.getElementById('noticeBanner');
  const bannerText = document.getElementById('bannerText');

  if (notices.length === 0) {
    list.innerHTML = '<div class="notice-empty">공지사항이 없습니다</div>';
    badge.style.display = 'none';
  } else {
    badge.style.display = 'flex';
    badge.textContent = notices.length;
    list.innerHTML = notices.map(n => `
      <div class="notice-item ${n.urgent ? 'urgent' : ''}">
        <div class="notice-title">${n.urgent ? '&#128680; ' : ''}${n.title}</div>
        <div class="notice-body">${n.body}</div>
        <div class="notice-date">${n.date}</div>
      </div>
    `).join('');
  }

  // Show banner for first banner-flagged notice
  const bannerNotice = notices.find(n => n.banner);
  if (bannerNotice) {
    bannerText.textContent = bannerNotice.title + ' - ' + bannerNotice.body;
    banner.classList.remove('hidden');
  }
}

function renderAdminNotices() {
  const list = document.getElementById('adminNoticeList');
  if (!list) return;
  list.innerHTML = notices.map(n => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:6px;${n.urgent?'border-left:3px solid #e53e3e':''}">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">${n.title}</div>
        <div style="font-size:12px;color:#4a5568;">${n.body}</div>
      </div>
      <span style="font-size:11px;color:#a0aec0;">${n.date}</span>
      <button onclick="removeNotice(${n.id})" style="border:none;background:none;color:#e53e3e;cursor:pointer;font-size:16px;">&times;</button>
    </div>
  `).join('');
}

function addNotice() {
  const title = document.getElementById('noticeTitle').value.trim();
  const body = document.getElementById('noticeBody').value.trim();
  const urgent = document.getElementById('noticeUrgent').checked;
  const isBanner = document.getElementById('noticeBanner').checked;
  if (!title) return;
  notices.unshift({id:nextNoticeId++, title, body, date:new Date().toISOString().slice(0,10), urgent, banner:isBanner});
  document.getElementById('noticeTitle').value = '';
  document.getElementById('noticeBody').value = '';
  document.getElementById('noticeUrgent').checked = false;
  document.getElementById('noticeBanner').checked = false;
  renderNotices();
  renderAdminNotices();
  showToast('공지사항이 추가되었습니다');

  // Send Slack notification if webhook is set
  if (slackWebhookUrl) {
    sendSlackNotification('📢 공지사항: ' + title + '\n' + body);
  }
}

function removeNotice(id) {
  notices = notices.filter(n => n.id !== id);
  renderNotices();
  renderAdminNotices();
  showToast('공지사항이 삭제되었습니다');
}

function toggleNoticeDropdown(e) {
  e.stopPropagation();
  document.getElementById('noticeDropdown').classList.toggle('show');
}

document.addEventListener('click', () => {
  document.getElementById('noticeDropdown').classList.remove('show');
});

// ============ SLACK INTEGRATION ============
function saveSlackWebhook() {
  slackWebhookUrl = document.getElementById('slackWebhook').value.trim();
  showToast('Slack Webhook URL이 저장되었습니다');
}

function sendSlackNotification(message) {
  if (!slackWebhookUrl) return;
  // Note: Direct webhook calls from browser are blocked by CORS.
  // In production, route through a server-side proxy or use Slack API.
  // This is a placeholder for the integration.
  console.log('[Slack Notification]', message, '-> URL:', slackWebhookUrl);
  // fetch(slackWebhookUrl, {method:'POST', body:JSON.stringify({text:message})}).catch(e => console.log('Slack error:', e));
}

function testSlackNotification() {
  if (!slackWebhookUrl) {
    showToast('먼저 Webhook URL을 입력하세요');
    return;
  }
  sendSlackNotification('🔔 테스트 알림: 커미션 대시보드 Slack 연동이 정상적으로 설정되었습니다.');
  showToast('테스트 알림이 발송되었습니다 (콘솔 확인)');
}

// ============ FILTER & SEARCH ============
let currentFilter = 'all';
let currentSearch = '';
let currentView = 'card';

function getFiltered() {
  let list = airlines;
  if (currentSearch) {
    const q = currentSearch.toUpperCase();
    list = list.filter(a => a.code.toUpperCase().includes(q));
  }
  if (currentFilter === 'has-bsp') list = list.filter(a => getNum(a.bsp) > 0);
  if (currentFilter === 'has-over') list = list.filter(a => getNum(a.over) > 0);
  if (currentFilter === 'kea') list = list.filter(a => isKEA(a));
  return list;
}

function refresh() {
  const filtered = getFiltered();
  renderCards(filtered);
  renderListView(filtered);

  if (currentView === 'card') {
    document.getElementById('cardGrid').classList.add('active');
    document.getElementById('listView').classList.remove('active');
  } else {
    document.getElementById('cardGrid').classList.remove('active');
    document.getElementById('listView').classList.add('active');
  }
}

// ============ ROUTING ============
function route() {
  const hash = location.hash || '#list';
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'none';

  document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));

  if (hash === '#admin') {
    document.getElementById('adminPage').style.display = 'block';
    document.querySelector('.header-nav a[href="#admin"]').classList.add('active');
    renderAdminNotices();
  } else {
    document.getElementById('listPage').style.display = 'block';
    document.querySelector('.header-nav a[href="#list"]').classList.add('active');
  }
}

// ============ EVENT LISTENERS ============
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  refresh();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    refresh();
  });
});

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    refresh();
  });
});

window.addEventListener('hashchange', route);

// ============ INIT ============
renderStats();
renderNotices();
refresh();
route();
</script>
</body>
</html>
